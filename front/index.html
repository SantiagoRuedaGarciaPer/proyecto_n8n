<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Inasistencia</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="form-container">
    <h2>Formulario de Inasistencia</h2>
    <!--- para pruebas ingresa la url con webhook-test-->
    <form target="_blank" action="https://kamesappo.app.n8n.cloud/webhook/enviar_soporte" method="POST" enctype="multipart/form-data" id="Formulario">

        <label for="nombre">Nombre completo</label>
        <input type="text" id="nombre" name="nombre">

        <label for="id">ID / Documento</label>
        <input type="text" id="id" name="id">

        <label for="correo">Correo electrónico</label>
        <input type="text" id="correo" name="correo">

        <label for="motivo">Motivo de inasistencia</label>
        <select id="motivo" name="motivo">
            <option value="">Seleccione una opción</option>
            <option value="enfermedad">Enfermedad</option>
            <option value="calamidad">Calamidad familiar</option>
            <option value="cita">Cita médica</option>
            <option value="otro">Otro</option>
        </select>

        <label for="textarea">Justificacion</label>
        <input type="text" name="textarea" id="textarea" placeholder="Ingrese una breve explicacion del motivo de inasistencia">

        <h4>Adjuntar Soporte</h4>
        <label for="archivo" class="archivo_label">
            <p>Subir archivo</p>
            <img class="img" src="./assets/pngegg.png" alt="">
        </label>
        <input type="file" id="archivo" name="archivo" accept="image/*,application/pdf">

        <button id="submit">Enviar</button>
    </form>
</div>
<script src="./validaciones.js"></script>
</body>
</html>
