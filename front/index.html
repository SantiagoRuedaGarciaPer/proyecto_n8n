<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Inasistencia</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="form-container">
    <h2>Formulario de Inasistencia</h2>

    <form target="_blank" action="https://santiagoruedag.app.n8n.cloud/webhook-test/Validacion_inasistencias" method="POST" enctype="multipart/form-data" id="Formulario">

        <label for="nombre">Nombre completo</label>
        <input type="text" id="nombre" name="nombre" required>

        <label for="id">ID / Documento</label>
        <input type="text" id="id" name="id" required>

        <label for="correo">Correo electrónico</label>
        <input type="email" id="correo" name="correo" required>

        <label for="motivo">Motivo de inasistencia</label>
        <select id="motivo" name="motivo" required>
            <option value="">Seleccione una opción</option>
            <option value="enfermedad">Enfermedad</option>
            <option value="calamidad">Calamidad familiar</option>
            <option value="cita">Cita médica</option>
            <option value="otro">Otro</option>
        </select>

        <label for="archivo">Adjuntar soporte</label>
        <input type="file" id="archivo" name="archivo" accept="image/*,application/pdf" required>

        <button id="submit">Enviar</button>
    </form>
</div>
<script src="./validaciones.js"></script>
</body>
</html>
